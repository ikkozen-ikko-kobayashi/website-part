<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>長期休息の提案（良好）</title>
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    line-height: 1.7;
    color: #333;
    max-width: 640px;
    margin: 0 auto;
    padding: 32px 20px;
  }
  h1 {
    font-size: 1.5rem;
    text-align: center;
    border-bottom: 2px solid #e5e5ea;
    padding-bottom: 12px;
    margin-bottom: 24px;
  }
  .advice {
    font-size: 1.25rem;
    text-align: center;
    margin: 32px 0 16px;
    font-weight: 600;
  }
  .description {
    text-align: center;
    color: #555;
    margin-bottom: 24px;
  }
  @media (prefers-color-scheme: dark) {
    body { background: #1a1a18; color: #e8e6df; }
    h1 { border-bottom-color: #3a3a38; }
    .description { color: #a8a69e; }
  }
</style>
</head>
<body>
  <h1>長期休息の提案（良好）</h1>
  <p class="advice">自由に過ごしましょう♪</p>
  <p class="description">心拍変動は良好な状態です。無理のないペースで過ごしましょう。</p>
</body>
</html>
